<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공룡 뽑기 — 당첨 or 꽝</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1B10;
    --bg-soft: #14261A;
    --card: #182C1D;
    --text: #F1EFE4;
    --text-dim: #9AAE9C;
    --line: rgba(255,255,255,0.11);
    --gold: #E8B93F;
    --danger: #C9564B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(1300px 650px at 15% -10%, #2B4A26 0%, transparent 55%),
      radial-gradient(1000px 600px at 95% 10%, #1B3320 0%, transparent 55%),
      linear-gradient(180deg, #0B1B10, #060F0A 75%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 20px 50px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .jungle-decor { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
  .leaf-blob {
    position: absolute; filter: blur(3px); opacity: 0.35;
    background: radial-gradient(circle at 35% 30%, #3B6B36, #1E3A1C 70%);
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .eyebrow::before, .eyebrow::after { content: ''; width: 22px; height: 1px; background: var(--gold); opacity: 0.6; }

  h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: clamp(30px, 6vw, 44px); text-align: center; }
  h1 em { font-style: italic; color: var(--gold); }

  .subtitle { margin-top: 12px; color: var(--text-dim); font-size: 15px; text-align: center; max-width: 480px; }

  /* ---------- setup panel ---------- */
  .setup {
    margin-top: 36px; width: 100%; max-width: 560px;
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 26px;
  }
  .setup-label { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 0.03em; }

  .name-input-row { display: flex; gap: 8px; }
  #name-input {
    flex: 1; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 12px;
    padding: 13px 16px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
    transition: border-color 0.2s ease;
  }
  #name-input:focus { outline: none; border-color: var(--gold); }
  #add-name-btn {
    padding: 0 20px; border-radius: 12px; border: 1px solid var(--line); background: var(--bg-soft);
    color: var(--text); font-weight: 600; font-size: 14px; cursor: pointer;
    transition: border-color 0.2s ease;
  }
  #add-name-btn:hover { border-color: var(--gold); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; min-height: 10px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--bg-soft); border: 1px solid var(--line); border-radius: 100px;
    padding: 7px 8px 7px 14px; font-size: 13px; font-weight: 500;
  }
  .chip button {
    width: 18px; height: 18px; border-radius: 50%; border: none; cursor: pointer;
    background: rgba(255,255,255,0.12); color: var(--text-dim); font-size: 11px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .chip button:hover { background: var(--danger); color: #fff; }

  .ratio-row { display: flex; align-items: center; gap: 14px; margin-top: 22px; flex-wrap: wrap; }
  #winner-count {
    width: 84px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 15px;
    text-align: center;
  }
  #winner-count:focus { outline: none; border-color: var(--gold); }
  .ratio-info { font-size: 13px; color: var(--text-dim); }
  .ratio-info b { color: var(--gold); font-family: 'JetBrains Mono', monospace; }

  #start-btn {
    margin-top: 24px; width: 100%; padding: 17px; border: none; border-radius: 100px;
    background: linear-gradient(135deg, var(--gold), #C9932B);
    color: #14180F; font-weight: 700; font-size: 16px; cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 12px 26px -10px rgba(232, 185, 63, 0.45);
  }
  #start-btn:hover { transform: translateY(-2px); }
  #start-btn:disabled { opacity: 0.55; cursor: default; transform: none; }

  .setup-error { margin-top: 12px; font-size: 13px; color: var(--danger); min-height: 18px; text-align: center; }

  /* ---------- game area ---------- */
  .status-bar {
    margin-top: 34px; display: none; align-items: center; gap: 18px; flex-wrap: wrap; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim);
  }
  .status-bar.visible { display: flex; }
  .status-bar b { color: var(--gold); }
  .status-bar .pill {
    background: var(--card); border: 1px solid var(--line); border-radius: 100px; padding: 9px 18px;
  }

  .game-actions { margin-top: 16px; display: none; gap: 10px; }
  .game-actions.visible { display: flex; }
  .ghost-btn {
    padding: 11px 22px; border-radius: 100px; cursor: pointer; font-size: 13px; font-weight: 600;
    background: var(--bg-soft); color: var(--text); border: 1px solid var(--line);
    transition: border-color 0.2s ease;
  }
  .ghost-btn:hover { border-color: var(--gold); }

  .grid {
    margin-top: 28px; width: 100%; max-width: 940px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(215px, 1fr)); gap: 18px;
  }

  .dino-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 16px 12px 18px; text-align: center; position: relative; overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease;
    opacity: 0; transform: translateY(14px);
  }
  .dino-card.enter { animation: cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes cardEnter { to { opacity: 1; transform: translateY(0); } }

  .dino-card.clickable:hover { transform: translateY(-4px); border-color: var(--gold); }
  .dino-card.busy { cursor: default; }
  .dino-card.done { cursor: default; }
  .dino-card.done.win { border-color: rgba(232,185,63,0.65); }
  .dino-card.done.lose { border-color: rgba(255,255,255,0.06); }
  .dino-card.done.lose .dino-svg { filter: saturate(0.35) brightness(0.8); transition: filter 0.8s ease; }

  .q-badge {
    position: absolute; top: 12px; right: 12px; width: 26px; height: 26px; border-radius: 50%;
    background: var(--bg-soft); border: 1px solid var(--line); color: var(--gold);
    font-family: 'Fraunces', serif; font-weight: 900; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.3s ease;
  }
  .dino-card.done .q-badge, .dino-card.busy .q-badge { opacity: 0; }

  .dino-wrap { position: relative; height: 132px; display: flex; align-items: flex-end; justify-content: center; }
  .dino-svg { width: 196px; height: auto; overflow: visible; }

  .dino-svg .dino-root, .dino-svg .fire, .dino-svg .jaw, .dino-svg .idle-bob {
    transform-box: fill-box;
  }
  .dino-root { transform-origin: 50% 92%; }
  .idle-bob { transform-origin: 50% 100%; }
  .jaw { transform-origin: 6% 30%; }
  .fire { transform-origin: 0% 50%; opacity: 0; }

  .idle-bob.bobbing { animation: bob 2.4s ease-in-out infinite; }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .name-tag {
    margin-top: 10px; font-weight: 600; font-size: 15px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hint-tag { margin-top: 3px; font-size: 11.5px; color: var(--text-dim); }

  .stamp {
    position: absolute; top: 34%; left: 50%; z-index: 10;
    font-family: 'Fraunces', serif; font-weight: 900; font-size: 34px; white-space: nowrap;
    pointer-events: none; opacity: 0;
    transform: translate(-50%, -50%);
  }
  .stamp.win-stamp {
    background: linear-gradient(135deg, #FFE28A, var(--gold) 55%, #C9932B);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 18px rgba(232,185,63,0.45));
  }
  .stamp.lose-stamp { color: #B9C4BB; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.5)); }

  .smoke {
    position: absolute; border-radius: 50%; pointer-events: none; z-index: 8;
    background: radial-gradient(circle, rgba(200,205,200,0.85), rgba(150,155,150,0.15) 70%);
  }

  .spark {
    position: absolute; border-radius: 50%; pointer-events: none; z-index: 8;
    background: radial-gradient(circle, #FFE28A, #FF7A3C 70%);
  }

  #confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 300; overflow: hidden; }
  .confetti-piece { position: absolute; top: -20px; border-radius: 2px; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(110vh) rotate(540deg); opacity: 0.2; } }

  .summary {
    margin-top: 34px; display: none; text-align: center;
    background: var(--card); border: 1px solid var(--gold); border-radius: 18px;
    padding: 22px 34px; max-width: 560px;
  }
  .summary.visible { display: block; animation: cardEnter 0.5s ease forwards; opacity: 0; transform: translateY(14px); }
  .summary h2 { font-family: 'Fraunces', serif; font-size: 21px; color: var(--gold); margin-bottom: 8px; }
  .summary p { font-size: 14px; color: var(--text-dim); }
  .summary b { color: var(--text); }

  footer { margin-top: 50px; color: var(--text-dim); font-size: 12px; text-align: center; }

  @media (max-width: 520px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .dino-svg { width: 150px; }
    .dino-wrap { height: 104px; }
    .stamp { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="jungle-decor">
  <div class="leaf-blob" style="width:420px;height:300px;top:-120px;left:-100px;border-radius:60% 40% 55% 45% / 45% 55% 40% 60%; transform: rotate(-15deg);"></div>
  <div class="leaf-blob" style="width:360px;height:260px;top:-80px;right:-120px;border-radius:45% 55% 60% 40% / 55% 45% 60% 40%; transform: rotate(20deg);"></div>
  <div class="leaf-blob" style="width:320px;height:240px;bottom:-100px;left:-80px;border-radius:55% 45% 40% 60% / 40% 60% 45% 55%; transform: rotate(8deg);"></div>
  <div class="leaf-blob" style="width:300px;height:220px;bottom:-90px;right:-90px;border-radius:40% 60% 45% 55% / 60% 40% 55% 45%; transform: rotate(-10deg);"></div>
</div>

<div id="confetti-layer"></div>

<div class="eyebrow">Dino Draw · FastAPI</div>
<h1>공룡 뽑기 — <em>당첨</em> or 꽝</h1>
<p class="subtitle">이름을 넣고 당첨 인원을 정하면, 사람 수만큼 공룡이 나와요. 공룡을 클릭해 결과를 확인하세요 🦖</p>

<div class="setup" id="setup">
  <div class="setup-label">참가자 이름 (엔터 또는 추가 버튼, 쉼표로 여러 명 한번에 가능)</div>
  <div class="name-input-row">
    <input id="name-input" type="text" placeholder="예: 우경, 민수, 지현" maxlength="60">
    <button id="add-name-btn">추가</button>
  </div>
  <div class="chips" id="chips"></div>

  <div class="ratio-row">
    <div class="setup-label" style="margin:0">당첨 인원</div>
    <input id="winner-count" type="number" min="0" value="1">
    <div class="ratio-info" id="ratio-info">참가자를 추가해주세요</div>
  </div>

  <button id="start-btn" disabled>공룡 소환하기 🦖</button>
  <div class="setup-error" id="setup-error"></div>
</div>

<div class="status-bar" id="status-bar">
  <div class="pill">전체 <b id="stat-total">0</b>명</div>
  <div class="pill">당첨 <b id="stat-win">0</b> / <b id="stat-win-total">0</b></div>
  <div class="pill">남은 공룡 <b id="stat-left">0</b></div>
</div>
<div class="game-actions" id="game-actions">
  <button class="ghost-btn" id="reveal-all-btn">전체 공개 ⏭</button>
  <button class="ghost-btn" id="reset-btn">새 게임 ↺</button>
</div>

<div class="grid" id="grid"></div>

<div class="summary" id="summary">
  <h2>🎉 결과 발표</h2>
  <p id="summary-text"></p>
</div>

<footer>이 결과는 무작위이며, 재미로만 즐겨주세요 :)</footer>

<script>
  /* ============ 상태 ============ */
  const names = [];
  let gameResults = null;   // [{name, win}]
  let revealedCount = 0;
  let foundWinners = 0;

  /* ============ DOM ============ */
  const nameInput = document.getElementById('name-input');
  const addNameBtn = document.getElementById('add-name-btn');
  const chipsEl = document.getElementById('chips');
  const winnerCountEl = document.getElementById('winner-count');
  const ratioInfoEl = document.getElementById('ratio-info');
  const startBtn = document.getElementById('start-btn');
  const setupErrorEl = document.getElementById('setup-error');
  const setupEl = document.getElementById('setup');
  const gridEl = document.getElementById('grid');
  const statusBar = document.getElementById('status-bar');
  const gameActions = document.getElementById('game-actions');
  const revealAllBtn = document.getElementById('reveal-all-btn');
  const resetBtn = document.getElementById('reset-btn');
  const summaryEl = document.getElementById('summary');
  const summaryTextEl = document.getElementById('summary-text');
  const confettiLayer = document.getElementById('confetti-layer');

  const statTotal = document.getElementById('stat-total');
  const statWin = document.getElementById('stat-win');
  const statWinTotal = document.getElementById('stat-win-total');
  const statLeft = document.getElementById('stat-left');

  const confettiColors = ['#E8B93F', '#4C8DE8', '#E8574C', '#4FAE6E', '#F1EFE4'];

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  /* ============ 셋업 UI ============ */
  function renderChips() {
    chipsEl.innerHTML = '';
    names.forEach((n, i) => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.innerHTML = `${escapeHtml(n)} <button title="삭제">✕</button>`;
      chip.querySelector('button').addEventListener('click', () => {
        names.splice(i, 1);
        renderChips();
      });
      chipsEl.appendChild(chip);
    });
    updateRatioInfo();
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateRatioInfo() {
    const total = names.length;
    let w = parseInt(winnerCountEl.value, 10);
    if (isNaN(w) || w < 0) w = 0;
    if (total === 0) {
      ratioInfoEl.textContent = '참가자를 추가해주세요';
      startBtn.disabled = true;
      return;
    }
    if (w > total) { w = total; winnerCountEl.value = total; }
    winnerCountEl.max = total;
    const pct = total > 0 ? Math.round((w / total) * 100) : 0;
    ratioInfoEl.innerHTML = `<b>${w}</b> / ${total}명 당첨 (확률 <b>${pct}%</b>)`;
    startBtn.disabled = false;
  }

  function addNamesFromInput() {
    const raw = nameInput.value.trim();
    if (!raw) return;
    const parts = raw.split(/[,\n]+/).map(s => s.trim()).filter(Boolean);
    for (const p of parts) {
      if (names.length >= 30) { setupErrorEl.textContent = '최대 30명까지 가능해요.'; break; }
      names.push(p.slice(0, 12));
    }
    nameInput.value = '';
    setupErrorEl.textContent = '';
    renderChips();
    nameInput.focus();
  }

  addNameBtn.addEventListener('click', addNamesFromInput);
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addNamesFromInput(); });
  winnerCountEl.addEventListener('input', updateRatioInfo);

  /* ============ 공룡 SVG 템플릿 ============ */
  function dinoSvg() {
    return `
    <svg class="dino-svg" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
      <g class="dino-root">
        <g class="idle-bob bobbing">
          <path d="M62,120 Q20,128 8,106 Q2,94 20,92 Q46,90 66,102 Z"
                fill="#5E9147" stroke="#2E4B22" stroke-width="4" stroke-linejoin="round"/>
          <rect x="66" y="132" width="24" height="34" rx="11" fill="#4E7C3A" stroke="#2E4B22" stroke-width="4"/>
          <rect x="116" y="136" width="22" height="32" rx="10" fill="#4E7C3A" stroke="#2E4B22" stroke-width="4"/>
          <ellipse cx="104" cy="112" rx="58" ry="46" fill="#5E9147" stroke="#2E4B22" stroke-width="4"/>
          <ellipse cx="116" cy="128" rx="34" ry="26" fill="#D7E8B0"/>
          <path d="M58,74 L68,56 L80,72 Z" fill="#3F6B2F"/>
          <path d="M84,66 L94,46 L106,64 Z" fill="#3F6B2F"/>
          <path d="M112,62 L122,44 L134,62 Z" fill="#3F6B2F"/>
          <path d="M120,86 Q132,46 170,36 Q186,34 194,48 L196,70 Q166,94 130,98 Z"
                fill="#5E9147" stroke="#2E4B22" stroke-width="4" stroke-linejoin="round"/>
          <path d="M192,66 L246,66 L240,84 L192,84 Z" fill="#7A2A24"/>
          <path d="M150,64 Q148,26 186,22 Q232,18 248,48 Q252,58 244,62 L192,66 Q168,70 150,64 Z"
                fill="#5E9147" stroke="#2E4B22" stroke-width="4" stroke-linejoin="round"/>
          <path d="M200,64 L206,74 L212,64 Z" fill="#F5F0DC"/>
          <path d="M216,64 L222,74 L228,64 Z" fill="#F5F0DC"/>
          <path d="M232,62 L238,72 L244,62 Z" fill="#F5F0DC"/>
          <g class="jaw">
            <path d="M190,80 Q192,72 202,74 L240,80 Q248,84 242,92 Q220,102 196,94 Q188,88 190,80 Z"
                  fill="#4E7C3A" stroke="#2E4B22" stroke-width="4" stroke-linejoin="round"/>
          </g>
          <circle cx="238" cy="42" r="3.5" fill="#2E4B22"/>
          <g class="eye-open">
            <circle cx="182" cy="42" r="10" fill="#FFFFFF" stroke="#2E4B22" stroke-width="3"/>
            <circle cx="185" cy="43" r="4.5" fill="#1B2814"/>
          </g>
          <g class="eye-dead" opacity="0">
            <line x1="175" y1="35" x2="190" y2="50" stroke="#2E4B22" stroke-width="4" stroke-linecap="round"/>
            <line x1="190" y1="35" x2="175" y2="50" stroke="#2E4B22" stroke-width="4" stroke-linecap="round"/>
          </g>
          <path d="M138,104 Q152,108 150,118 Q142,122 134,114 Z" fill="#4E7C3A" stroke="#2E4B22" stroke-width="4" stroke-linejoin="round"/>
          <g class="fire" transform="translate(248,72)">
            <path d="M0,0 Q26,-24 62,-12 Q88,-2 62,10 Q26,24 0,0 Z" fill="#FF7A3C"/>
            <path d="M0,0 Q20,-15 46,-8 Q64,-1 46,7 Q20,15 0,0 Z" fill="#FFB25C"/>
            <path d="M0,0 Q13,-8 28,-4 Q38,0 28,4 Q13,8 0,0 Z" fill="#FFE9A8"/>
          </g>
        </g>
      </g>
    </svg>`;
  }

  /* ============ 이펙트 헬퍼 ============ */
  function burstConfetti(count = 70) {
    for (let i = 0; i < count; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const size = 6 + Math.random() * 6;
      piece.style.width = size + 'px';
      piece.style.height = size * 0.4 + 'px';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      piece.style.animationDuration = (2.2 + Math.random() * 1.6) + 's';
      confettiLayer.appendChild(piece);
      setTimeout(() => piece.remove(), 4200);
    }
  }

  function spawnSparks(card, x, y, count = 10) {
    for (let i = 0; i < count; i++) {
      const spark = document.createElement('div');
      spark.className = 'spark';
      const size = 4 + Math.random() * 6;
      spark.style.width = size + 'px';
      spark.style.height = size + 'px';
      spark.style.left = x + 'px';
      spark.style.top = y + 'px';
      card.appendChild(spark);
      const angle = (Math.random() * 90 - 45) * (Math.PI / 180);
      const dist = 34 + Math.random() * 40;
      spark.animate([
        { transform: 'translate(0,0) scale(1)', opacity: 1 },
        { transform: `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px) scale(0.15)`, opacity: 0 }
      ], { duration: 480 + Math.random() * 160, easing: 'ease-out', fill: 'forwards' });
      setTimeout(() => spark.remove(), 700);
    }
  }

  function spawnSmoke(card, x, y, count = 3) {
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const puff = document.createElement('div');
        puff.className = 'smoke';
        const size = 12 + Math.random() * 10;
        puff.style.width = size + 'px';
        puff.style.height = size + 'px';
        puff.style.left = (x + Math.random() * 14 - 7) + 'px';
        puff.style.top = y + 'px';
        card.appendChild(puff);
        puff.animate([
          { transform: 'translateY(0) scale(0.6)', opacity: 0.85 },
          { transform: `translateY(-${30 + Math.random() * 18}px) scale(1.5)`, opacity: 0 }
        ], { duration: 850 + Math.random() * 250, easing: 'ease-out', fill: 'forwards' });
        setTimeout(() => puff.remove(), 1200);
      }, i * 170);
    }
  }

  function mouthPoint(card) {
    // 카드 기준으로 공룡 입 위치(px) 계산
    const svg = card.querySelector('.dino-svg');
    const svgRect = svg.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();
    // viewBox 320x200에서 입 끝 (248,76)
    const scaleX = svgRect.width / 320;
    const scaleY = svgRect.height / 200;
    return {
      x: svgRect.left - cardRect.left + 248 * scaleX,
      y: svgRect.top - cardRect.top + 76 * scaleY
    };
  }

  /* ============ 애니메이션 시퀀스 (WAAPI - 끊김 없음) ============ */

  async function animCharge(root, jaw) {
    // 몸을 뒤로 젖히며 숨을 크게 들이쉼 + 입이 서서히 벌어짐
    const a1 = root.animate([
      { transform: 'rotate(0deg) translateY(0) scale(1)' },
      { transform: 'rotate(-4deg) translateY(-2px) scale(1.03)', offset: 0.55 },
      { transform: 'rotate(-8deg) translateY(-5px) scale(1.07)' }
    ], { duration: 560, easing: 'ease-in-out', fill: 'forwards' });
    const a2 = jaw.animate([
      { transform: 'rotate(0deg)' },
      { transform: 'rotate(14deg)' }
    ], { duration: 560, easing: 'ease-in-out', fill: 'forwards' });
    await Promise.all([a1.finished, a2.finished]);
  }

  async function animLunge(root) {
    // 앞으로 확 내밀며 발사 자세
    await root.animate([
      { transform: 'rotate(-8deg) translateY(-5px) scale(1.07)' },
      { transform: 'rotate(4deg) translateY(1px) scale(1.04)' }
    ], { duration: 170, easing: 'cubic-bezier(0.5, 0, 0.75, 1)', fill: 'forwards' }).finished;
  }

  async function animReturnToIdle(root, jaw) {
    const a1 = root.animate([
      { transform: 'rotate(4deg) translateY(1px) scale(1.04)' },
      { transform: 'rotate(0deg) translateY(0) scale(1)' }
    ], { duration: 340, easing: 'cubic-bezier(0.34, 1.4, 0.64, 1)', fill: 'forwards' });
    const a2 = jaw.animate([
      { transform: 'rotate(14deg)' },
      { transform: 'rotate(0deg)' }
    ], { duration: 340, easing: 'ease-out', fill: 'forwards' });
    await Promise.all([a1.finished, a2.finished]);
  }

  async function playWin(card) {
    const root = card.querySelector('.dino-root');
    const jaw = card.querySelector('.jaw');
    const fire = card.querySelector('.fire');
    const bob = card.querySelector('.idle-bob');
    bob.classList.remove('bobbing');

    await animCharge(root, jaw);
    await animLunge(root);

    // 불꽃 발사: 커졌다가 일렁이며 유지
    const mp = mouthPoint(card);
    spawnSparks(card, mp.x, mp.y, 12);
    card.animate([
      { transform: 'translateX(0)' }, { transform: 'translateX(-4px)' },
      { transform: 'translateX(4px)' }, { transform: 'translateX(-3px)' },
      { transform: 'translateX(2px)' }, { transform: 'translateX(0)' }
    ], { duration: 380, easing: 'ease-out' });

    fire.style.opacity = '1';
    await fire.animate([
      { transform: 'scale(0.1, 0.4)', opacity: 0.4 },
      { transform: 'scale(1.2, 1.05)', opacity: 1, offset: 0.55 },
      { transform: 'scale(1, 1)', opacity: 1 }
    ], { duration: 260, easing: 'ease-out', fill: 'forwards' }).finished;

    // 일렁임 (원 상태로 돌아오는 keyframe으로 자연 연결)
    await fire.animate([
      { transform: 'scale(1,1)' },
      { transform: 'scale(1.1, 0.9)' },
      { transform: 'scale(0.94, 1.07)' },
      { transform: 'scale(1.06, 0.95)' },
      { transform: 'scale(1,1)' }
    ], { duration: 640, iterations: 2, easing: 'ease-in-out', fill: 'forwards' }).finished;

    // 스탬프 + 컨페티
    showStamp(card, '당첨!', true);
    burstConfetti(60);

    // 불꽃 자연스럽게 소멸
    await fire.animate([
      { transform: 'scale(1,1)', opacity: 1 },
      { transform: 'scale(0.5, 0.6)', opacity: 0 }
    ], { duration: 300, easing: 'ease-in', fill: 'forwards' }).finished;

    await animReturnToIdle(root, jaw);

    // 기쁨의 폴짝폴짝 2회
    await root.animate([
      { transform: 'translateY(0)' },
      { transform: 'translateY(-12px)', offset: 0.25 },
      { transform: 'translateY(0)', offset: 0.5 },
      { transform: 'translateY(-8px)', offset: 0.75 },
      { transform: 'translateY(0)' }
    ], { duration: 620, easing: 'ease-in-out', fill: 'forwards' }).finished;

    bob.classList.add('bobbing');
  }

  async function playLose(card) {
    const root = card.querySelector('.dino-root');
    const jaw = card.querySelector('.jaw');
    const fire = card.querySelector('.fire');
    const bob = card.querySelector('.idle-bob');
    const eyeOpen = card.querySelector('.eye-open');
    const eyeDead = card.querySelector('.eye-dead');
    bob.classList.remove('bobbing');

    // 당첨과 완전히 똑같은 도입부 → 결과 예측 불가
    await animCharge(root, jaw);
    await animLunge(root);

    // 불꽃이 나오려다... 찔끔
    const mp = mouthPoint(card);
    fire.style.opacity = '1';
    await fire.animate([
      { transform: 'scale(0.1, 0.4)', opacity: 0.4 },
      { transform: 'scale(0.55, 0.7)', opacity: 1, offset: 0.5 },
      { transform: 'scale(0.4, 0.5)', opacity: 0.9 }
    ], { duration: 300, easing: 'ease-out', fill: 'forwards' }).finished;

    // 픽... 픽... 꺼짐 (기침하듯 두 번 움찔)
    const cough = root.animate([
      { transform: 'rotate(4deg) translateY(1px) scale(1.04)' },
      { transform: 'rotate(6deg) translateY(3px) scale(1.02)', offset: 0.3 },
      { transform: 'rotate(3deg) translateY(1px) scale(1.03)', offset: 0.55 },
      { transform: 'rotate(6deg) translateY(3px) scale(1.01)' }
    ], { duration: 480, easing: 'ease-in-out', fill: 'forwards' });
    await fire.animate([
      { transform: 'scale(0.4, 0.5)', opacity: 0.9 },
      { transform: 'scale(0.22, 0.35)', opacity: 0.6, offset: 0.45 },
      { transform: 'scale(0.3, 0.4)', opacity: 0.5, offset: 0.65 },
      { transform: 'scale(0.05, 0.1)', opacity: 0 }
    ], { duration: 480, easing: 'ease-in', fill: 'forwards' }).finished;
    await cough.finished;

    spawnSmoke(card, mp.x, mp.y - 6, 4);
    await sleep(380); // 한 박자 정적... (긴장)

    // 눈이 X로 스르륵 바뀌며
    eyeOpen.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 220, fill: 'forwards' });
    eyeDead.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 220, fill: 'forwards' });

    // 뒤로 쿵 쓰러짐 (끝에서 살짝 튕김)
    await root.animate([
      { transform: 'rotate(6deg) translateY(3px) scale(1.01)' },
      { transform: 'rotate(-30deg) translateY(4px) scale(1.0)', offset: 0.45 },
      { transform: 'rotate(-76deg) translateY(10px)', offset: 0.8 },
      { transform: 'rotate(-70deg) translateY(9px)', offset: 0.9 },
      { transform: 'rotate(-74deg) translateY(10px)' }
    ], { duration: 900, easing: 'cubic-bezier(0.55, 0, 0.8, 0.6)', fill: 'forwards' }).finished;

    // 쓰러질 때 카드 흔들림 + 먼지
    card.animate([
      { transform: 'translateY(0)' }, { transform: 'translateY(3px)' }, { transform: 'translateY(0)' }
    ], { duration: 240, easing: 'ease-out' });
    spawnSmoke(card, mp.x - 90, mp.y + 30, 3);

    showStamp(card, '꽝...', false);
  }

  function showStamp(card, text, isWin) {
    const stamp = document.createElement('div');
    stamp.className = 'stamp ' + (isWin ? 'win-stamp' : 'lose-stamp');
    stamp.textContent = text;
    card.appendChild(stamp);
    stamp.animate([
      { opacity: 0, transform: 'translate(-50%, -50%) scale(0.3) rotate(-8deg)' },
      { opacity: 1, transform: 'translate(-50%, -50%) scale(1.18) rotate(3deg)', offset: 0.45 },
      { opacity: 1, transform: 'translate(-50%, -50%) scale(1) rotate(-2deg)' }
    ], { duration: 520, easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)', fill: 'forwards' });
  }

  /* ============ 게임 로직 ============ */
  async function startGame() {
    setupErrorEl.textContent = '';
    startBtn.disabled = true;
    startBtn.textContent = '공룡 소환 중...';

    const winners = parseInt(winnerCountEl.value, 10) || 0;

    let data;
    try {
      const res = await fetch('/api/draw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ names, winners })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || '서버 오류');
      }
      data = await res.json();
    } catch (e) {
      setupErrorEl.textContent = e.message || '서버 연결에 실패했어요.';
      startBtn.disabled = false;
      startBtn.textContent = '공룡 소환하기 🦖';
      return;
    }

    gameResults = data.results;
    revealedCount = 0;
    foundWinners = 0;

    setupEl.style.display = 'none';
    statusBar.classList.add('visible');
    gameActions.classList.add('visible');
    summaryEl.classList.remove('visible');

    statTotal.textContent = gameResults.length;
    statWinTotal.textContent = winners;
    statWin.textContent = '0';
    statLeft.textContent = gameResults.length;

    gridEl.innerHTML = '';
    gameResults.forEach((r, i) => {
      const card = buildDinoCard(r, i);
      gridEl.appendChild(card);
    });
  }

  function buildDinoCard(result, index) {
    const card = document.createElement('div');
    card.className = 'dino-card clickable enter';
    card.style.animationDelay = (index * 0.07) + 's';
    card.innerHTML = `
      <div class="q-badge">?</div>
      <div class="dino-wrap">${dinoSvg()}</div>
      <div class="name-tag">${escapeHtml(result.name)}</div>
      <div class="hint-tag">클릭해서 확인</div>
    `;

    card._result = result;
    card._revealed = false;

    card.addEventListener('click', () => revealCard(card));
    return card;
  }

  async function revealCard(card) {
    if (card._revealed || card.classList.contains('busy')) return;
    card._revealed = true;
    card.classList.remove('clickable');
    card.classList.add('busy');
    card.querySelector('.hint-tag').textContent = '두구두구...';

    const isWin = card._result.win;
    if (isWin) {
      await playWin(card);
    } else {
      await playLose(card);
    }

    card.classList.remove('busy');
    card.classList.add('done', isWin ? 'win' : 'lose');
    card.querySelector('.hint-tag').textContent = isWin ? '축하해요! 🎉' : '다음 기회에...';

    revealedCount++;
    if (isWin) foundWinners++;
    statWin.textContent = foundWinners;
    statLeft.textContent = gameResults.length - revealedCount;

    if (revealedCount === gameResults.length) {
      showSummary();
    }
  }

  function showSummary() {
    const winnersNames = gameResults.filter(r => r.win).map(r => r.name);
    summaryTextEl.innerHTML = winnersNames.length > 0
      ? `당첨자: <b>${winnersNames.map(escapeHtml).join(', ')}</b> 🎊`
      : '이번 판은 당첨자가 없었어요 😅';
    summaryEl.classList.add('visible');
    if (winnersNames.length > 0) burstConfetti(90);
  }

  revealAllBtn.addEventListener('click', async () => {
    const cards = [...gridEl.querySelectorAll('.dino-card')].filter(c => !c._revealed);
    for (const card of cards) {
      revealCard(card); // 순차 대기 없이 살짝 시차만 두고 동시에
      await sleep(280);
    }
  });

  resetBtn.addEventListener('click', () => {
    gridEl.innerHTML = '';
    statusBar.classList.remove('visible');
    gameActions.classList.remove('visible');
    summaryEl.classList.remove('visible');
    setupEl.style.display = 'block';
    startBtn.disabled = names.length === 0;
    startBtn.textContent = '공룡 소환하기 🦖';
    gameResults = null;
  });

  startBtn.addEventListener('click', startGame);
  renderChips();
</script>
